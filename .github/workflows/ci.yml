name: CI

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: docker compose config renders (dummy env satisfies the ${VAR:?} guards)
        run: |
          printf 'HINDSIGHT_API_KEY=ci\nPOSTGRES_PASSWORD=ci\nLLM_UPSTREAM_BASE_URL=https://example.invalid\nEMBEDDINGS_BASE_URL=https://example.invalid/v1\n' > .ci.env
          docker compose --env-file .ci.env config -q
          docker compose -f examples/docker-compose.prebuilt.yml --env-file .ci.env config -q
          echo "compose config OK (root + examples/)"

      - name: nothink-proxy image builds
        run: docker build -t nothink-proxy:ci ./nothink-proxy

      - name: proxy Python compiles
        run: python3 -m py_compile nothink-proxy/main.py

      - name: smoke.sh shell checks
        run: |
          bash -n scripts/smoke.sh
          shellcheck -S error scripts/smoke.sh

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history so gitleaks scans every commit
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No GITLEAKS_LICENSE needed: this is a personal (non-org) repo.

  publish-proxy:
    # Build + push the nothink-proxy image to GHCR. Only on main pushes and version
    # tags (never on PRs), and only after `validate` passes.
    needs: validate
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/nothink-proxy
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./nothink-proxy
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
